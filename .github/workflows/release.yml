name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Leave empty to use the pushed tag or auto-generate by run number"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.target }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name || format('v0.1.{0}', github.run_number) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # - os: macos-latest
          #   target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # - os: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            libssl-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          sed -i.bak 's/"version": ".*"/"version": "'"$VERSION"'"/'  package.json && rm package.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/"   src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
          sed -i.bak 's/"version": ".*"/"version": "'"$VERSION"'"/'  src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          echo "============================================"
          echo $VERSION
          echo "============================================"
          cat src-tauri/Cargo.toml
          echo "============================================"
          cat package.json
          echo "============================================"
          cat src-tauri/tauri.conf.json
          echo "============================================"          

      - name: Build and create GitHub Release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "WebDAV-Client ${{ env.RELEASE_TAG }}"
          releaseBody: |
            ## WebDAV-Client Release

            ### Platforms
            - macOS Apple Silicon (aarch64)
            - Windows x64

            ### macOS first-run fix (unsigned app)
            If macOS shows **damaged** or blocks opening, run:

            ```bash
            xattr -c /Applications/WebDAV-Client.app
            ```

          releaseDraft: true
          prerelease: false
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          assetNamePattern: "WebDAV-Client_v[version]-[arch][setup][ext]"

      - name: Add install instructions to macOS DMG
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          DMG_PATH=$(find src-tauri/target -name "*.dmg" -path "*/bundle/dmg/*" | head -1)
          if [ -z "$DMG_PATH" ]; then echo "No DMG found"; exit 1; fi
          echo "DMG: $DMG_PATH"

          # Convert to read-write
          hdiutil convert "$DMG_PATH" -format UDRW -o /tmp/rw.dmg -quiet

          # Mount
          MOUNT=$(hdiutil attach /tmp/rw.dmg -readwrite -nobrowse | tail -1)
          MOUNT_POINT=$(echo "$MOUNT" | awk '{print $NF}')
          echo "Mounted at: $MOUNT_POINT"

          # Copy install instructions into DMG
          cp INSTALL-macOS.txt "$MOUNT_POINT/"

          # Sync and detach (retry to handle "resource busy")
          sync
          for i in 1 2 3; do
            hdiutil detach "$MOUNT_POINT" -quiet && break
            sleep 2
          done

          # Convert back to compressed, overwrite original
          hdiutil convert /tmp/rw.dmg -format UDZO -o "$DMG_PATH" -quiet

          # Re-upload to release (replace the original DMG)
          FILENAME=$(basename "$DMG_PATH")
          gh release upload "${{ env.RELEASE_TAG }}" "$DMG_PATH" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
