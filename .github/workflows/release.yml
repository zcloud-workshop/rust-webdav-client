name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Leave empty to use the pushed tag or auto-generate by run number"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.target }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name || format('v0.1.{0}', github.run_number) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # - os: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            libssl-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and create GitHub Release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "WebDAV-Client ${{ env.RELEASE_TAG }}"
          releaseBody: |
            ## WebDAV-Client Release

            ### Platforms
            - macOS Apple Silicon (aarch64)
            - macOS Intel (x86_64)
            - Windows x64

            ### macOS first-run fix (unsigned app)
            If macOS shows **damaged** or blocks opening, run:

            ```bash
            xattr -c /Applications/WebDAV-Client.app
            ```

          releaseDraft: true
          prerelease: false
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          assetNamePattern: "WebDAV-Client_v[version]-[arch][setup][ext]"
